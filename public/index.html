<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom X Outlook</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 860px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h1 {
      text-align: center;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 24px 0;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 16px;
    }
    .status {
      margin: 12px auto 20px;
      padding: 10px 12px;
      max-width: 720px;
      border-radius: 8px;
      background: #f5f5f5;
      text-align: center;
      word-break: break-word;
    }
    .email {
      border: 1px solid #ddd;
      padding: 12px;
      margin: 12px 0;
      border-radius: 8px;
    }
    .meta {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }
    .debug {
      margin-top: 24px;
      padding: 12px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Zoom X Outlook</h1>

  <div class="actions">
    <button id="connectBtn">Connect Outlook</button>
    <button id="fetchBtn">Fetch last 3 emails</button>
    <button id="debugBtn">Run Debug Check</button>
  </div>

  <div id="status" class="status">Loading app...</div>
  <div id="emails"></div>
  <div id="debug" class="debug"></div>

  <script src="/sdk.js"></script>
  <script>
    let zoomReady = false;
    let linkId = localStorage.getItem("outlookLinkId");

    if (!linkId) {
      linkId = crypto.randomUUID();
      localStorage.setItem("outlookLinkId", linkId);
    }

    const statusEl = document.getElementById("status");
    const emailsEl = document.getElementById("emails");
    const debugEl = document.getElementById("debug");
    const connectBtn = document.getElementById("connectBtn");
    const fetchBtn = document.getElementById("fetchBtn");
    const debugBtn = document.getElementById("debugBtn");

    function setStatus(message) {
      statusEl.textContent = message;
      console.log("[STATUS]", message);
    }

    function appendDebug(label, value) {
      const line = `${label}: ${typeof value === "string" ? value : JSON.stringify(value, null, 2)}`;
      debugEl.textContent += line + "\n";
      console.log("[DEBUG]", label, value);
    }

    async function initZoom() {
      debugEl.textContent = "";

      appendDebug("window.location.href", window.location.href);
      appendDebug("window.location.origin", window.location.origin);
      appendDebug("navigator.userAgent", navigator.userAgent);
      appendDebug("linkId", linkId);
      appendDebug("window.zoomSdk present", !!window.zoomSdk);

      try {
        if (!window.zoomSdk) {
          setStatus("Zoom SDK script missing");
          return;
        }

        setStatus("Zoom SDK detected, configuring...");

        const result = await window.zoomSdk.config({
          version: "0.16",
          capabilities: ["openUrl"]
        });

        zoomReady = true;
        appendDebug("zoomSdk.config result", result || "ok");
        setStatus("Zoom SDK ready");
      } catch (err) {
        appendDebug("zoomSdk.config error", err?.message || String(err));
        setStatus("Zoom SDK config failed");
      }
    }

    async function checkConnectionStatus() {
      try {
        const res = await fetch(`/auth/outlook/status?linkId=${encodeURIComponent(linkId)}`);
        const data = await res.json();
        appendDebug("auth/outlook/status", data);

        if (data.connected) {
          setStatus(`Outlook connected: ${data.account || "unknown account"}`);
          return true;
        }

        return false;
      } catch (err) {
        appendDebug("checkConnectionStatus error", err?.message || String(err));
        return false;
      }
    }

    async function pollForConnection() {
      setStatus("Waiting for Outlook connection...");

      let tries = 0;
      const maxTries = 60;

      const timer = setInterval(async () => {
        tries += 1;
        const connected = await checkConnectionStatus();

        if (connected) {
          clearInterval(timer);
          setStatus("Outlook connected. You can fetch emails now.");
        } else if (tries >= maxTries) {
          clearInterval(timer);
          setStatus("Connection timeout. Try Connect Outlook again.");
        }
      }, 2000);
    }

    async function connectOutlook() {
      const authUrl = `${window.location.origin}/auth/outlook/start?linkId=${encodeURIComponent(linkId)}`;

      appendDebug("connectOutlook clicked", new Date().toISOString());
      appendDebug("authUrl", authUrl);

      try {
        pollForConnection();

        if (zoomReady && window.zoomSdk) {
          setStatus("Opening Microsoft sign-in via Zoom SDK...");
          await window.zoomSdk.openUrl({ url: authUrl });
          appendDebug("zoomSdk.openUrl", "called successfully");
          return;
        }

        setStatus("Zoom SDK not ready. Fallback redirect...");
        window.location.href = authUrl;
      } catch (err) {
        appendDebug("openUrl error", err?.message || String(err));
        setStatus("openUrl failed. Fallback redirect...");
        window.location.href = authUrl;
      }
    }

    async function loadEmails() {
      setStatus("Loading emails...");
      emailsEl.innerHTML = "";

      try {
        const res = await fetch(`/emails/latest?linkId=${encodeURIComponent(linkId)}`, {
          credentials: "include"
        });

        const data = await res.json();
        appendDebug("emails/latest status", res.status);
        appendDebug("emails/latest response", data);

        if (!res.ok) {
          setStatus(data.message || data.error || "Failed to load emails");
          return;
        }

        setStatus(`Loaded ${data.emails.length} email(s)`);

        emailsEl.innerHTML = data.emails.map(mail => `
          <div class="email">
            <div><strong>Subject:</strong> ${mail.subject}</div>
            <div><strong>From:</strong> ${mail.fromName} &lt;${mail.fromAddress}&gt;</div>
            <div class="meta"><strong>Received:</strong> ${mail.receivedDateTime}</div>
            <div style="margin-top:8px;"><strong>Preview:</strong> ${mail.bodyPreview}</div>
          </div>
        `).join("");
      } catch (err) {
        appendDebug("loadEmails error", err?.message || String(err));
        setStatus("Request failed while loading emails");
      }
    }

    async function runDebugCheck() {
      try {
        setStatus("Running debug check...");
        const res = await fetch("/debug/sdk");
        const data = await res.json();
        appendDebug("debug/sdk response", data);

        await checkConnectionStatus();

        setStatus("Debug check completed");
      } catch (err) {
        appendDebug("debug check error", err?.message || String(err));
        setStatus("Debug check failed");
      }
    }

    connectBtn.addEventListener("click", connectOutlook);
    fetchBtn.addEventListener("click", loadEmails);
    debugBtn.addEventListener("click", runDebugCheck);

    initZoom();
    checkConnectionStatus();
  </script>
</body>
</html>
